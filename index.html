(function(){function V(c,r){var t=((r.children[c]||{}).textContent||'').trim();if(/^[0-9]{1,2}:[0-9]{2}$/.test(t))return parseInt(t.replace(':',''),10);var n=parseFloat(t);if(isNaN(n))return t;return t.includes('万亿')?n*10000:t.includes('亿')?n:n;}
