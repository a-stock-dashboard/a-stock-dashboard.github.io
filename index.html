(function(){function V(c,r){var t=((r.children[c]||{}).textContent||'').trim();if(/^[0-9]{1,2}:[0-9]{2}(:[0-9]{2})?$/.test(t)){var p=t.split(':');return parseInt(p[0])*3600+parseInt(p[1])*60+(parseInt(p[2])||0);}var n=parseFloat(t);if(isNaN(n))return t;return t.includes('万亿')?n*10000:t.includes('亿')?n:n;}

  for(var j=0;j<h.length;j++)(function(c,tbl){

      var B=tbl.querySelector('tbody');if(!B)return;
